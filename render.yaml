services:
  - type: web
    name: alumni-backend
    runtime: python
    plan: free
    region: oregon
    # Environment Variables defined here to ensure the correct Python version
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: DEBUG
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*"
    # The build script installs the driver and prepares the environment
    buildCommand: |
      # Force update pip and install setuptools explicitly
      pip install --upgrade pip setuptools wheel
      
      # Install the SQL Driver
      curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
      curl https://packages.microsoft.com/config/debian/11/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
      sudo apt-get update
      sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18
      
      # Install everything else
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
    startCommand: gunicorn alumni_system.wsgi:application